<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-shop | Katalogas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --accent: #f97316;
      --accent-dark: #c2410c;
      --accent-soft: #fff1e8;
      --ink: #31241c;
      --muted: #7b6a5f;
      --surface: rgba(255, 255, 255, 0.84);
      --border-soft: rgba(249, 115, 22, 0.14);
    }

    body {
      background:
        radial-gradient(circle at top left, rgba(255, 243, 224, 0.96), transparent 32%),
        radial-gradient(circle at top right, rgba(255, 232, 214, 0.78), transparent 26%),
        linear-gradient(180deg, #fff8f2 0%, #f8eee8 52%, #f5f7fb 100%);
      min-height: 100vh;
      color: var(--ink);
    }

    .navbar {
      background: rgba(255, 250, 246, 0.92) !important;
      backdrop-filter: blur(12px);
      border-color: rgba(194, 65, 12, 0.08) !important;
    }

    .navbar-brand {
      font-weight: 700;
      letter-spacing: 0.05em;
      color: var(--ink);
    }

    .cart-badge {
      font-size: 0.7rem;
      background: linear-gradient(135deg, var(--accent), #fb923c) !important;
    }

    .btn-dark {
      background: linear-gradient(135deg, var(--accent), #fb923c);
      border-color: transparent;
      box-shadow: 0 10px 24px rgba(249, 115, 22, 0.25);
    }

    .btn-dark:hover,
    .btn-dark:focus {
      background: linear-gradient(135deg, #ea580c, var(--accent-dark));
      border-color: transparent;
    }

    .btn-outline-secondary {
      border-color: rgba(123, 106, 95, 0.3);
      color: var(--ink);
    }

    .btn-outline-secondary:hover,
    .btn-outline-secondary:focus {
      background: var(--accent-soft);
      border-color: rgba(249, 115, 22, 0.35);
      color: var(--accent-dark);
    }

    .filter-card {
      position: sticky;
      top: 88px;
      background: var(--surface);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border-soft);
      box-shadow: 0 18px 45px rgba(108, 71, 33, 0.08) !important;
    }

    .filter-title {
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent-dark);
    }

    .form-control,
    .form-select,
    .input-group-text,
    .offcanvas {
      border-color: rgba(194, 65, 12, 0.1);
    }

    .form-control:focus,
    .form-select:focus {
      border-color: rgba(249, 115, 22, 0.45);
      box-shadow: 0 0 0 0.25rem rgba(249, 115, 22, 0.14);
    }

    .product-card {
      transition: transform 0.18s ease, box-shadow 0.18s ease;
      border-radius: 1.25rem;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid rgba(194, 65, 12, 0.08);
    }

    .product-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 1.2rem 2.8rem rgba(156, 89, 28, 0.12) !important;
    }

    .product-image-wrap {
      background:
        radial-gradient(circle at top, rgba(255, 255, 255, 0.85), transparent 45%),
        linear-gradient(180deg, #fff9f3 0%, #fff2e6 100%);
      border-top-left-radius: 1.25rem;
      border-top-right-radius: 1.25rem;
      min-height: 240px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .product-image {
      width: 100%;
      max-width: 180px;
      height: 180px;
      object-fit: contain;
    }

    .price {
      color: var(--accent-dark);
    }

    .result-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.55rem 0.9rem;
      background: rgba(255, 255, 255, 0.74);
      border: 1px solid rgba(249, 115, 22, 0.14);
      border-radius: 999px;
      color: var(--muted);
    }

    .text-bg-light {
      background: var(--accent-soft) !important;
      color: var(--accent-dark) !important;
      border-color: rgba(249, 115, 22, 0.16) !important;
    }

    .product-modal-image {
      max-height: 320px;
      object-fit: contain;
    }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg border-bottom sticky-top">
    <div class="container-fluid px-3 px-lg-4">
      <a class="navbar-brand" href="shop.html">E-shop Demo</a>

      <div class="d-flex align-items-center gap-2">
        <div class="input-group d-none d-md-flex" style="width: min(320px, 42vw);">
          <span class="input-group-text bg-white">Paieška</span>
          <input type="text" class="form-control" placeholder="Ieškoti prekės..." id="searchInput">
        </div>

        <button class="btn btn-outline-secondary btn-sm d-md-none" type="button" data-bs-toggle="offcanvas" data-bs-target="#filterOffcanvas">
          Filtrai
        </button>

        <a class="btn btn-dark btn-sm position-relative" href="cart.html">
          Krepšelis
          <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill cart-badge" id="cartCount">0</span>
        </a>
      </div>
    </div>
  </nav>

  <div class="offcanvas offcanvas-start d-md-none" tabindex="-1" id="filterOffcanvas">
    <div class="offcanvas-header">
      <h2 class="h5 mb-0">Filtrai</h2>
      <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body" id="offcanvasFilterBody"></div>
  </div>

  <main class="container-fluid py-4 px-3 px-lg-4">
    <div class="row g-4 align-items-start">
      <div class="col-12">
        <div id="notice"></div>
      </div>

      <div class="col-12 d-flex justify-content-between align-items-start flex-wrap gap-3">
        <div>
          <h2 class="h3 mb-1">Produktų katalogas</h2>
          <p class="text-muted mb-0">Peržiūrėk asortimentą, filtruok kategorijas ir įsidėk patikusias prekes į krepšelį.</p>
        </div>

        <div class="d-flex align-items-center gap-2 flex-wrap">
          <label class="text-muted small" for="sortSelect">Rikiuoti</label>
          <select class="form-select form-select-sm w-auto" id="sortSelect">
            <option value="desc">Naujesnės pradžioje</option>
            <option value="asc">Senesnės pradžioje</option>
          </select>
        </div>
      </div>

      <div class="col-md-4 col-xl-3 d-none d-md-block">
        <div class="card filter-card rounded-4">
          <div class="card-body" id="sidebarFilterBody"></div>
        </div>
      </div>

      <div class="col-12 col-md-8 col-xl-9">
        <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
          <span class="result-pill">Rodoma: <strong id="resultCount">0</strong> prekių</span>
        </div>
        <div class="row g-3 g-xl-4" id="productGrid"></div>
      </div>
    </div>
  </main>

  <div class="modal fade" id="productModal" tabindex="-1" aria-labelledby="productModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
      <div class="modal-content border-0 rounded-4 shadow">
        <div class="modal-header border-0">
          <h2 class="modal-title h5 mb-0" id="productModalLabel">Prekės detalės</h2>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body pt-0" id="productModalBody"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="shop.js"></script>
</body>
</html>
