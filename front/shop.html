<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mano parduotuvė</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #f8f9fa;
    }

    /* Navbar */
    .navbar-brand {
      font-weight: 600;
    }
    .cart-badge {
      font-size: 10px;
    }

    /* Filtrai */
    .filter-card {
      position: sticky;
      top: 80px;
    }
    .filter-card .card-title {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #6c757d;
    }
    .form-check-label {
      font-size: 14px;
    }

    /* Produktų kortelės */
    .product-card {
      transition: box-shadow 0.15s, transform 0.15s;
      cursor: pointer;
    }
    .product-card:hover {
      box-shadow: 0 4px 16px rgba(0,0,0,0.10);
      transform: translateY(-2px);
    }
    .product-card .card-img-top {
      height: 160px;
      object-fit: cover;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
    }
    .product-card .badge-cat {
      font-size: 10px;
    }
    .product-card .card-title {
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 4px;
    }
    .product-card .price {
      font-size: 15px;
      font-weight: 600;
    }
    .low-stock {
      font-size: 11px;
      color: #fd7e14;
    }
    .out-of-stock {
      opacity: 0.55;
    }

    /* Offcanvas filtrai (telefonui) */
    #filterOffcanvas .offcanvas-title {
      font-weight: 600;
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar navbar-light bg-white border-bottom sticky-top">
    <div class="container-fluid px-3">
      <a class="navbar-brand" href="#">Mano parduotuvė</a>

      <div class="d-flex align-items-center gap-2">
        <!-- Paieška (paslepiama mažuose ekranuose) -->
        <div class="input-group d-none d-md-flex" style="width: 200px;">
          <input type="text" class="form-control form-control-sm" placeholder="Ieškoti..." id="searchInput" oninput="renderProducts()">
        </div>

        <!-- Filtrai mygtukas (tik telefonui) -->
        <button class="btn btn-outline-secondary btn-sm d-md-none" type="button" data-bs-toggle="offcanvas" data-bs-target="#filterOffcanvas">
          Filtrai
        </button>

        <!-- Krepšelis -->
        <button class="btn btn-outline-dark btn-sm position-relative" onclick="window.location='cart.html'">
          🛒
          <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger cart-badge" id="cartCount">0</span>
        </button>

        <!-- Paskyra -->
        <button class="btn btn-outline-secondary btn-sm d-none d-sm-inline">Paskyra</button>
      </div>
    </div>
  </nav>

  <!-- OFFCANVAS FILTRAI (telefonui) -->
  <div class="offcanvas offcanvas-start d-md-none" tabindex="-1" id="filterOffcanvas">
    <div class="offcanvas-header">
      <h5 class="offcanvas-title">Filtrai</h5>
      <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body" id="offcanvasFilterBody">
      <!-- Užpildoma JS -->
    </div>
  </div>

  <!-- PAGRINDINIS TURINYS -->
  <div class="container-fluid py-3 px-3">
    <div class="row g-3">

      <!-- FILTRAI (staliniams / planšetėms) -->
      <div class="col-md-3 col-lg-2 d-none d-md-block">
        <div class="card filter-card border-0 shadow-sm">
          <div class="card-body" id="sidebarFilterBody">
            <!-- Užpildoma JS -->
          </div>
        </div>
      </div>

      <!-- PRODUKTAI -->
      <div class="col-12 col-md-9 col-lg-10">

        <!-- Rezultatų juosta -->
        <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
          <span class="text-muted" style="font-size:14px">
            Rodoma: <strong id="resultCount">0</strong> prekių
          </span>
          <select class="form-select form-select-sm w-auto" id="sortSelect" onchange="renderProducts()">
            <option value="new">Naujausias</option>
            <option value="asc">Kaina: mažiausia</option>
            <option value="desc">Kaina: didžiausia</option>
          </select>
        </div>

        <!-- Produktų tinklelis -->
        <div class="row g-3" id="productGrid">
          <!-- Užpildoma JS -->
        </div>

      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="shop.js"></script>
</body>
</html>
