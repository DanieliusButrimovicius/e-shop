<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-shop | Krepšelis</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --accent: #f97316;
      --accent-dark: #c2410c;
      --accent-soft: #fff1e8;
      --ink: #31241c;
      --muted: #7b6a5f;
      --surface: rgba(255, 255, 255, 0.84);
      --border-soft: rgba(249, 115, 22, 0.14);
    }

    body {
      background:
        radial-gradient(circle at top left, rgba(255, 243, 224, 0.96), transparent 32%),
        radial-gradient(circle at top right, rgba(255, 232, 214, 0.78), transparent 26%),
        linear-gradient(180deg, #fff8f2 0%, #f8eee8 52%, #f5f7fb 100%);
      min-height: 100vh;
      color: var(--ink);
    }

    .navbar {
      background: rgba(255, 250, 246, 0.92) !important;
      backdrop-filter: blur(12px);
      border-color: rgba(194, 65, 12, 0.08) !important;
    }

    .navbar-brand {
      font-weight: 700;
      letter-spacing: 0.05em;
      color: var(--ink);
    }

    .cart-badge {
      font-size: 0.7rem;
      background: linear-gradient(135deg, var(--accent), #fb923c) !important;
    }

    .btn-dark {
      background: linear-gradient(135deg, var(--accent), #fb923c);
      border-color: transparent;
      box-shadow: 0 10px 24px rgba(249, 115, 22, 0.25);
    }

    .btn-dark:hover,
    .btn-dark:focus {
      background: linear-gradient(135deg, #ea580c, var(--accent-dark));
      border-color: transparent;
    }

    .btn-outline-secondary,
    .btn-outline-danger {
      border-color: rgba(123, 106, 95, 0.26);
    }

    .btn-outline-secondary:hover,
    .btn-outline-secondary:focus,
    .btn-outline-danger:hover,
    .btn-outline-danger:focus {
      background: var(--accent-soft);
      color: var(--accent-dark);
      border-color: rgba(249, 115, 22, 0.25);
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border-soft) !important;
      box-shadow: 0 18px 45px rgba(108, 71, 33, 0.08) !important;
    }

    .cart-item-image {
      width: 100%;
      max-width: 96px;
      height: 96px;
      object-fit: contain;
    }

    code {
      color: var(--accent-dark);
    }

    .text-bg-light {
      background: var(--accent-soft) !important;
      color: var(--accent-dark) !important;
      border-color: rgba(249, 115, 22, 0.16) !important;
    }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg border-bottom sticky-top">
    <div class="container">
      <a class="navbar-brand" href="shop.html">E-shop Demo</a>
      <div class="d-flex align-items-center gap-2">
        <a class="btn btn-outline-secondary btn-sm" href="shop.html">Katalogas</a>
        <button class="btn btn-dark btn-sm position-relative" type="button">
          Krepšelis
          <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill cart-badge" id="cartCount">0</span>
        </button>
      </div>
    </div>
  </nav>

  <main class="container py-4 py-lg-5">
    <div class="row g-4 align-items-start">
      <div class="col-12">
        <div id="notice"></div>
      </div>

      <div class="col-12 col-xl-8">
        <div class="d-grid gap-3" id="cartItems"></div>
      </div>

      <div class="col-12 col-xl-4">
        <div id="summary"></div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="cart.js"></script>
</body>
</html>
